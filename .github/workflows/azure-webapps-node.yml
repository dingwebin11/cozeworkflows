# 当有提交推送到您的默认分支时，此工作流将构建并把 Node.js 应用程序部署到 Azure Web 应用。
#
# 本工作流假定您已创建好目标 Azure App Service Web 应用。
# 有关说明，请参阅 https://docs.microsoft.com/en-us/azure/app-service/quickstart-nodejs?tabs=linux&pivots=development-environment-cli
#
# 用于配置此工作流：
#
# 1. 下载适用于您的 Azure Web 应用的发布配置文件。您可以在 Azure 门户中通过 Web 应用的“概述”页面下载该文件。
# 有关更多信息，请参阅：https://docs.microsoft.com/en-us/azure/app-service/deploy-github-actions?tabs=applevel#generate-deployment-credentials
#
# 2. 在您的代码仓库中创建一个名为 AZURE_WEBAPP_PUBLISH_PROFILE 的密钥，并将发布配置文件的内容作为该密钥的值粘贴进去。
# 有关获取发布配置文件的说明，请参阅：https://docs.microsoft.com/azure/app-service/deploy-github-actions#configure-the-github-secret
#
# 3. 更改 AZURE_WEBAPP_NAME 的值。您还可以选择更改下方的 AZURE_WEBAPP_PACKAGE_PATH 和 NODE_VERSION 环境变量。
#
# 有关 Azure 的 GitHub Actions 的更多信息：https://github.com/Azure/Actions
# 有关 Azure Web 应用部署操作的更多信息：https://github.com/Azure/webapps-deploy
# 有关使用 GitHub Actions 工作流部署到 Azure 的更多入门示例：https://github.com/Azure/actions-workflow-samples

on:
  push:
    分支: [ "main" ]
 工作流调度:

env:
 AZURE_WEBAPP_NAME: 您的应用名称    # 请将其设置为您的应用程序名称
 AZURE_WEBAPP_PACKAGE_PATH: '.'      # 请将其设置为您的 Web 应用程序项目的路径，默认值为仓库根目录
 NODE_VERSION: '20.x'                # 将其设置为要使用的 Node.js 版本

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: npm install, build, and test
      run: |
        npm install
        npm run build --if-present
        npm run test --if-present

    - name: Upload artifact for deployment job
      uses: actions/upload-artifact@v4
      with:
        name: node-app
        path: .

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: node-app

    - name: 'Deploy to Azure WebApp'
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
