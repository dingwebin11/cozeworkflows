# 这是一个帮助您快速上手 Actions 的基础工作流

名称: CI

# 控制工作流的运行时机
on:
  # 仅在“main”分支上，当发生推送或拉取请求事件时触发工作流
  push:
分支: [ "main" ]
 拉取请求:
分支: [ "main" ]

  # 允许您从“操作”选项卡手动运行此工作流
 工作流调度:

# 一个工作流运行由一个或多个作业组成，这些作业可以按顺序或并行执行
jobs:
  # 此工作流包含一个名为“build”的单个作业
  build:
    # 作业将运行的运行器类型
    runs-on: ubuntu-latest

    # 步骤表示作为作业一部分将执行的一系列任务
    步骤:
      # 在 $GITHUB_WORKSPACE 目录下检出您的代码库，以便您的作业可以访问它
      - 用途: actions/checkout@v4

      # 使用 runner 的 shell 运行单个命令
      - 名称: 运行一行脚本
        run: echo Hello, world!

      # 使用 runner 的 shell 运行一组命令
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
